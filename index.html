<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GABRIEL</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #181818;
            color: #e0e0e0;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-title {
            color: #a78bfa;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: #a78bfa;
            font-weight: 300;
            font-style: italic;
            margin-top: -5px;
            margin-bottom: 30px;
            text-align: center;
        }

        .title-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #a78bfa;
            object-fit: cover;
            transition: transform 0.3s ease-in-out;

        }

        .title-logo:hover {
            transform: scale(1.3);
        }

        .title-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .main-title {
            margin-bottom: 0;
        }

        .info-text {
            position: absolute;
            right: 100%;
            margin-right: 20px;

            color: #a78bfa;
            font-weight: 500;
            font-size: 1rem;
            white-space: nowrap;

            opacity: 0;
            top: 50%;
            transform: translateY(-30%) translateX(15px);

            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        .info-text.visible {
            opacity: 1;
            transform: translateY(-30%) translateX(0);
        }

        .nav-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 50px;
        }

        .nav-button {
            padding: 10px 20px;
            background-color: #333;
            color: #a78bfa;
            text-decoration: none;
            border: 1px solid #a78bfa;
            border-radius: 20px;
            font-weight: 500;
            transition: background-color 0.3s, color 0.3s, transform 0.2s;
        }

        .nav-button:hover {
            background-color: #a78bfa;
            color: #181818;
            transform: translateY(-2px);
        }

        .portfolio-main-content {
            width: 90%;
            max-width: 1200px;
        }

        .portfolio-section {
            margin-bottom: 50px;
        }

        .section-title {
            color: #a78bfa;
            /* Violeta */
            font-size: 1.8em;
            padding-bottom: 10px;
            border-bottom: 2px solid #555;
            margin-bottom: 30px;
        }

        .gif-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            align-items: start;
        }

        .gif-card {
            display: block;
            text-decoration: none !important;
            color: inherit;
            background-color: #222;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 2px solid transparent;
            transition: transform 0.3s ease-in-out, border-color 0.3s ease-in-out;
        }

        .gif-card:hover {
            transform: scale(1.1);
            border-color: #a78bfa;
        }

        .gif-card[href="#"] {
            cursor: default;
        }

        .gif-card img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid #333;
        }

        .gif-card iframe {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 2px solid #333;
        }

        .gif-card iframe {
            aspect-ratio: 16 / 9;
            border: none;
            border-bottom: 2px solid #333;
        }

        .gif-card h3 {
            color: #a78bfa;
            margin: 20px 0;
            padding: 0 15px;
            font-size: 1.1em;
            font-weight: 500;
            text-decoration: none !important;
        }

        .card-title-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        .card-title-area h3 {
            color: #a78bfa;
            font-size: 1.1em;
            font-weight: 500;
            text-decoration: none !important;
            margin: 0;
            padding-right: 10px;
        }

        .toggle-description-btn {
            background: none;
            border: none;
            color: #a78bfa;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        .card-description {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;

            color: #ccc;
            font-size: 0.9em;
            text-align: left;
            padding: 0 15px;
            margin: 0;
            border-top: 1px solid #333;
        }

        .card-description.show {
            max-height: 300px;
            overflow-y: auto;
            padding-top: 10px;
            padding-bottom: 15px;
            transition: max-height 0.4s ease-in;
        }

        .card-description::-webkit-scrollbar {
            width: 8px;
        }

        .card-description::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }

        .card-description::-webkit-scrollbar-thumb {
            background-color: #a78bfa;
            border-radius: 10px;
            border: 2px solid #222;
        }

        .card-description::-webkit-scrollbar-thumb:hover {
            background-color: #a78bfa;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            color: #777;
            font-size: 0.9em;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .social-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            color: #000000;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
        }

        .social-button:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
        }

        .social-button i {
            font-size: 1.2em;
        }

        .github {
            background-color: #a78bfa;
        }

        .linkedin {
            background-color: #a78bfa;
        }

        .email {
            background-color: #a78bfa;
        }

        /* Nuevo contenedor principal */
        .tech-categories {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin-bottom: 50px;
            width: 100%;
            max-width: 900px;
        }

        /* Cada bloque de categoría */
        .tech-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Etiqueta de la categoría */
        .group-label {
            color: #a78bfa;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        /* Contenedor de los iconos dentro del grupo */
        .tech-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        /* Estilo de los iconos (mantenemos tu estética) */
        .tech-icons img {
            width: 50px;
            /* Un poco más pequeños para que el grupo no sea gigante */
            height: 50px;
            border-radius: 50%;
            border: 2px solid #a78bfa;
            object-fit: cover;
            padding: 3px;
            background-color: #222;
            transition: transform 0.2s ease-in-out;
        }

        .tech-icons img:hover {
            transform: scale(1.15);
        }

        /* Media query para que en desktop los grupos se vean en filas si quieres */
        @media (min-width: 768px) {
            .tech-categories {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                align-items: flex-start;
            }

            .tech-group {
                width: calc(50% - 30px);
                /* Dos grupos por fila en tablets/laptops */
            }
        }

        .tech-icons-container img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #a78bfa;
            object-fit: cover;
            padding: 2px;
            background-color: #222;
            transition: transform 0.2s ease-in-out, border-color 0.2s ease-in-out;
            flex-shrink: 0;
        }

        .tech-icons-container img:hover {
            transform: scale(1.1);
            border-color: #a78bfa;
        }

        .card-description ul {
            list-style: none;
            padding-left: 5px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .card-description li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .card-description li .fa-solid {
            color: #a78bfa;
            margin-top: 4px;
        }

        .card-description hr {
            border: none;
            border-top: 1px solid #444;
            margin: 15px 0;
        }

        .card-description .item-label {
            min-width: 140px;
            flex-shrink: 0;
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <div class="title-container">
        <span id="info-text" class="info-text"></span>

        <h1 class="main-title">
            <img src="images/logo.jpg" alt="Mi Logo" class="title-logo">
            <span>GABRIEL DE LA CRUZ</span>
        </h1>
    </div>
    <p class="page-subtitle">FULL STACK DEVELOPER</p>

    <div class="tech-categories">
        <div class="tech-group">
            <span class="group-label">Game Engines</span>
            <div class="tech-icons">
                <img src="images/unreal_engine.png" alt="Unreal Engine" title="Unreal Engine">
                <img src="images/unity.png" alt="Unity" title="Unity">                
            </div>
        </div>

        <div class="tech-group">
            <span class="group-label">Design Tools</span>
            <div class="tech-icons">                
                <img src="images/blender.png" alt="Blender" title="Blender">
                <img src="images/photoshop.png" alt="Adobe Photoshop" title="Adobe Photoshop">
                <img src="images/premiere.png" alt="Adobe Premiere" title="Adobe Premiere">
            </div>
        </div>

        <div class="tech-group">
            <span class="group-label">Languages & DB</span>
            <div class="tech-icons">
                <img src="images/c_sharp.png" alt="C#" title="C#">
                <img src="images/c_plus_plus.png" alt="C++" title="C++">
                <img src="images/php.png" alt="PHP" title="PHP">
                <img src="images/sql.png" alt="SQL" title="SQL">
                <img src="images/javascript.png" alt="JavaScript" title="JavaScript">
            </div>
        </div>

        <div class="tech-group">
            <span class="group-label">Web & Cloud</span>
            <div class="tech-icons">
                <img src="images/html.png" alt="HTML" title="HTML">
                <img src="images/aws.png" alt="Amazon Web Services" title="Amazon Web Services">
                <img src="images/github.png" alt="Github" title="Github">
            </div>
        </div>

        <div class="tech-group">
            <span class="group-label">Tools & OS</span>
            <div class="tech-icons">
                <img src="images/visual_studio.png" alt="Visual Studio" title="Visual Studio">
                <img src="images/rider.png" alt="Rider" title="Rider">                
                <img src="images/windows.png" alt="Windows" title="Windows">
                <img src="images/linux.png" alt="Linux" title="Linux">
            </div>
        </div>
    </div>

    <nav class="nav-container" id="nav-buttons"></nav>

    <main class="portfolio-main-content" id="portfolio-main"></main>


    <script type="module">

        const BIRTH_DATE = '1998-12-08';
        const WORK_START_DATE = '2018-01-01';

        document.addEventListener('DOMContentLoaded', () => {
            const infoTextElement = document.getElementById('info-text');
            const titleLogo = document.querySelector('.title-logo');

            if (infoTextElement && titleLogo) {
                const getYearsDifference = (dateString) => {
                    const today = new Date();
                    const startDate = new Date(dateString);
                    let years = today.getFullYear() - startDate.getFullYear();
                    const m = today.getMonth() - startDate.getMonth();
                    if (m < 0 || (m === 0 && today.getDate() < startDate.getDate())) {
                        years--;
                    }
                    return years;
                };

                const age = getYearsDifference(BIRTH_DATE);
                const experience = getYearsDifference(WORK_START_DATE);

                infoTextElement.textContent = `${age} years old | ${experience}+ years experience`;

                titleLogo.addEventListener('mouseenter', () => {
                    infoTextElement.classList.add('visible');
                });

                titleLogo.addEventListener('mouseleave', () => {
                    infoTextElement.classList.remove('visible');
                });
            }
        });

        const hoverSound = new Audio('sounds/hover.wav');
        hoverSound.volume = 0.5;

        import { allPortfolioItems } from './js/index.js';

        const portfolioData = allPortfolioItems;

        const navContainer = document.getElementById('nav-buttons');
        const mainContainer = document.getElementById('portfolio-main');

        portfolioData.forEach(section => {
            // Genera un ID único para la sección a partir de su título (ej: "Animaciones 2D" -> "animaciones-2d")
            const sectionId = section.title.toLowerCase().replace(/ /g, '-').replace(/[^a-z0-9-]/g, '');

            // 1. CREAR BOTÓN DE NAVEGACIÓN
            const navButton = document.createElement('a');
            navButton.classList.add('nav-button');
            navButton.href = '#' + sectionId;
            navButton.textContent = section.title;
            navContainer.appendChild(navButton);

            // 2. CREAR LA SECCIÓN DE CONTENIDO
            const sectionElement = document.createElement('section');
            sectionElement.id = sectionId;
            sectionElement.classList.add('portfolio-section');

            // 3. AÑADIR TÍTULO A LA SECCIÓN
            const titleElement = document.createElement('h2');
            titleElement.classList.add('section-title');
            titleElement.textContent = section.title;
            sectionElement.appendChild(titleElement);

            // 4. CREAR LA CUADRÍCULA PARA LOS GIFS DE ESTA SECCIÓN
            const gridElement = document.createElement('div');
            gridElement.classList.add('gif-grid');

            section.gifs.forEach(gifData => {
                const card = document.createElement('a');
                card.classList.add('gif-card');

                card.href = gifData.link;

                if (gifData.link && gifData.link !== '#') {
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                    card.addEventListener('mouseover', () => {
                        hoverSound.currentTime = 0;
                    });
                }
                else {
                    card.addEventListener('click', (event) => {
                        event.preventDefault();
                    });

                    // Opcional: Quitar el estilo de "enlace" si no hay link
                    card.style.cursor = 'default';
                }

                let mediaElement;
                if (gifData.youtubeId) {
                    mediaElement = document.createElement('iframe');
                    mediaElement.src = `https://www.youtube.com/embed/${gifData.youtubeId}`;
                    mediaElement.title = gifData.title;
                    mediaElement.setAttribute('frameborder', '0');
                    mediaElement.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
                    mediaElement.setAttribute('allowfullscreen', '');
                } else {
                    mediaElement = document.createElement('img');
                    mediaElement.src = 'gifs/' + gifData.file;
                    mediaElement.alt = gifData.title;
                }

                const titleArea = document.createElement('div');
                titleArea.classList.add('card-title-area');

                const title = document.createElement('h3');
                title.textContent = gifData.title;

                titleArea.appendChild(title);

                // --- LÓGICA PARA AÑADIR BOTÓN Y DESCRIPCIÓN ---
                if (gifData.description) {
                    const button = document.createElement('button');
                    button.classList.add('toggle-description-btn');
                    const icon = document.createElement('i');
                    icon.classList.add('fa-solid', 'fa-plus'); // Icono inicial
                    button.appendChild(icon);

                    const description = document.createElement('p');
                    description.classList.add('card-description');
                    description.innerHTML = gifData.description;


                    // Funciones de ayuda para no repetir código
                    const openDescription = () => {
                        description.classList.add('show');
                        icon.classList.remove('fa-plus');
                        icon.classList.add('fa-minus');
                    };

                    const closeDescription = () => {
                        description.classList.remove('show');
                        icon.classList.remove('fa-minus');
                        icon.classList.add('fa-plus');
                    };

                    // Evento para abrir con el hover
                    card.addEventListener('mouseenter', openDescription);

                    // Evento para cerrar al quitar el hover (si no está fijado)
                    card.addEventListener('mouseleave', () => {
                        if (!card.classList.contains('is-pinned')) {
                            closeDescription();
                        }
                    });

                    button.addEventListener('click', (event) => {
                        // Previene que al hacer clic en el botón, se active el enlace de la tarjeta
                        event.preventDefault();
                        event.stopPropagation();

                        // Alterna el estado 'fijado' en la tarjeta
                        card.classList.toggle('is-pinned');

                        // Si acabamos de fijarlo, nos aseguramos de que esté abierto
                        if (card.classList.contains('is-pinned')) {
                            openDescription();
                        }
                    });

                    titleArea.appendChild(button);
                    card.appendChild(mediaElement);
                    card.appendChild(titleArea);
                    card.appendChild(description);
                } else {
                    // Si no hay descripción, se mantiene la estructura simple
                    card.appendChild(mediaElement);
                    card.appendChild(titleArea);
                }

                gridElement.appendChild(card);
            });

            sectionElement.appendChild(gridElement);
            mainContainer.appendChild(sectionElement);
        });

        const contactButton = document.createElement('a');
        contactButton.classList.add('nav-button');
        contactButton.href = '#contact';
        contactButton.textContent = 'CONTACT';
        navContainer.appendChild(contactButton);
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <footer id="contact">
        <div class="social-links">

            <a href="https://github.com/Gabriel98pc" target="_blank" rel="noopener noreferrer"
                class="social-button github">
                <i class="fab fa-github"></i> Github
            </a>

            <a href="https://www.linkedin.com/in/gabriel-de-la-cruz-7b321b149/" target="_blank"
                rel="noopener noreferrer" class="social-button linkedin">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>

            <a href="mailto:gdlc1998unity@outlook.com" class="social-button email">
                <i class="fas fa-envelope"></i> Email
            </a>
        </div>
        <p>&copy; 2025 Gabriel De la cruz - Portfolio</p>
    </footer>

</body>
